# Nginx vhost for the Cloud Computing Laravel app.
# Install to: /etc/nginx/sites-available/cloud-app  (Ubuntu)
#         or: /etc/nginx/conf.d/cloud-app.conf      (Amazon Linux)
# Ubuntu: sudo ln -s /etc/nginx/sites-available/cloud-app /etc/nginx/sites-enabled/
#         sudo rm -f /etc/nginx/sites-enabled/default
# Then:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/cloud-app/public;
    index index.php;
    charset utf-8;

    # App + Laravel health endpoint (/up) used by the ALB target group.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Ubuntu (PPA ondrej/php): /run/php/php8.3-fpm.sock
        # Amazon Linux 2023:       /run/php-fpm/www.sock
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block dotfiles except ACME well-known.
    location ~ /\.(?!well-known).* { deny all; }

    client_max_body_size 20M;
    access_log /var/log/nginx/cloud-app.access.log;
    error_log  /var/log/nginx/cloud-app.error.log;
}
